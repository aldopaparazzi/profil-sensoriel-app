<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<style>

body{
    font-family:IBM Plex Sans,sans-serif;
    background:#F5F3EE;
    padding:40px;
}

.example{
    width:700px;
    margin:35px 0;
}

.labels{
    display:flex;
    justify-content:space-between;
    font-size:13px;
    color:#6B6860;
    margin-bottom:8px;
    font-family:IBM Plex Mono, monospace;
}

.track{
    position:relative;
    height:8px;
    background:#D8D2C8;
    border-radius:5px;
}

.tick{
    position:absolute;
    top:-4px;
    width:1px;
    height:16px;
    background:#AAA39A;
}

.zero{
    width:2px;
    background:#444;
}

.fill{
    position:absolute;
    top:0;
    height:8px;
    border-radius:5px;
}

.dot{
    position:absolute;
    top:50%;
    width:16px;
    height:16px;
    border-radius:50%;
    border:3px solid white;
    transform:translate(-50%,-50%);
    box-shadow:0 0 0 1px rgba(0,0,0,.15);
}

</style>
</head>
<body>

<h3>Valeur normale (+0.3)</h3>

<div class="example">

<div class="labels">
<span>-3</span><span>-2</span><span>-1</span><span>0</span><span>+1</span><span>+2</span><span>+3</span>
</div>

<div class="track">

<div class="tick" style="left:16.7%"></div>
<div class="tick" style="left:33.3%"></div>
<div class="tick zero" style="left:50%"></div>
<div class="tick" style="left:66.7%"></div>
<div class="tick" style="left:83.3%"></div>

<div class="fill"
     style="
     left:50%;
     width:5%;
     background:#9A958C;">
</div>

<div class="dot"
     style="
     left:55%;
     background:#9A958C;">
</div>

</div>

</div>
